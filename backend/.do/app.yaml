name: abba-backend
region: lon1

services:
  - name: django-api
    github:
      repo: yungzeal5/AbbaEZwash
      branch: master
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput
    run_command: gunicorn core.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SECRET_KEY
        value: "generate_a_strong_secret_key_in_the_dashboard"
        type: SECRET
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "${APP_DOMAIN}"
      - key: CORS_ALLOWED_ORIGINS
        # Update this to your Vercel URL once deployed
        value: "https://your-vercel-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-vercel-frontend.vercel.app"
      - key: DATABASE_URL
        value: "${db.DATABASE_URL}"
      - key: MONGO_URI
        value: "your_mongo_atlas_connection_string"
        type: SECRET

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
    cluster_name: abba-postgres
